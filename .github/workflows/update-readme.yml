name: Update README Experience
on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:
jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Fetch GitHub data + update README
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" https://api.github.com/users/yohaann196)
          CREATED_AT=$(echo $RESPONSE | jq -r '.created_at')
          JOIN_YEAR=$(echo $CREATED_AT | cut -d'-' -f1)
          CURRENT_YEAR=$(date +%Y)
          YEARS=$((CURRENT_YEAR - JOIN_YEAR))
          REPOS=$(echo $RESPONSE | jq -r '.public_repos')
          COMMITS=0
          REPO_NAMES=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/user/repos?per_page=100&type=all" \
            | jq -r '.[].full_name')
          for REPO in $REPO_NAMES; do
            HEADERS=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$REPO/commits?author=yohaann196&per_page=1" \
              -I)
            LAST_PAGE=$(echo "$HEADERS" | grep -i "link:" | grep -oP 'page=\K[0-9]+(?=>; rel="last")' || echo "")
            if [ -z "$LAST_PAGE" ]; then
              HAS_COMMIT=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
                "https://api.github.com/repos/$REPO/commits?author=yohaann196&per_page=1" \
                | jq -r 'if length > 0 then "1" else "0" end')
              COMMITS=$((COMMITS + HAS_COMMIT))
            else
              COMMITS=$((COMMITS + LAST_PAGE))
            fi
          done
          sed -i "s|<!--YEARS-->.*<!--/YEARS-->|<!--YEARS-->$YEARS<!--/YEARS-->|g" README.md
          sed -i "s|<!--REPOS-->.*<!--/REPOS-->|<!--REPOS-->$REPOS<!--/REPOS-->|g" README.md
          sed -i "s|<!--COMMITS-->.*<!--/COMMITS-->|<!--COMMITS-->$COMMITS<!--/COMMITS-->|g" README.md
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update years, repo count, and commits"
          git push
