name: Update README Experience

on:
  schedule:
    - cron: '0 0 1 1 *'
  workflow_dispatch:      

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Calculate time from GitHub join date
        id: years
        run: |
          CREATED_AT=$(curl -s https://api.github.com/users/yohaann196 | jq -r '.created_at')
          JOIN_YEAR=$(echo $CREATED_AT | cut -d'-' -f1)
          CURRENT_YEAR=$(date +%Y)
          YEARS=$((CURRENT_YEAR - JOIN_YEAR))
          echo "years=$YEARS" >> $GITHUB_OUTPUT

      - name: Update README
        run: |
          YEARS=${{ steps.years.outputs.years }}
          sed -i "s|<!--YEARS-->.*<!--/YEARS-->|<!--YEARS-->$YEARS<!--/YEARS-->|g" README.md

      - name: Commit + push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update years of experience to ${{ steps.years.outputs.years }}"
          git push
