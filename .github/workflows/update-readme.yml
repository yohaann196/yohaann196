name: Update README Experience

on:
  schedule:
    - cron: '0 0 1 * *'  # Runs at midnight on the 1st of every month
  workflow_dispatch:       # Allow manual trigger anytime

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch GitHub data + update README
        run: |
          RESPONSE=$(curl -s https://api.github.com/users/yohaann196)
          CREATED_AT=$(echo $RESPONSE | jq -r '.created_at')
          JOIN_YEAR=$(echo $CREATED_AT | cut -d'-' -f1)
          CURRENT_YEAR=$(date +%Y)
          YEARS=$((CURRENT_YEAR - JOIN_YEAR))
          REPOS=$(echo $RESPONSE | jq -r '.public_repos')
          sed -i "s|<!--YEARS-->.*<!--/YEARS-->|<!--YEARS-->$YEARS<!--/YEARS-->|g" README.md
          sed -i "s|<!--REPOS-->.*<!--/REPOS-->|<!--REPOS-->$REPOS<!--/REPOS-->|g" README.md

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update years and repo count"
          git push
