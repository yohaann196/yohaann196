name: Update README Experience

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch GitHub data and update README
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          USERNAME="${{ github.repository_owner }}"

          RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" https://api.github.com/users/$USERNAME)

          CREATED_AT=$(echo $RESPONSE | jq -r '.created_at')
          JOIN_YEAR=$(echo $CREATED_AT | cut -d'-' -f1)
          CURRENT_YEAR=$(date +%Y)
          YEARS=$((CURRENT_YEAR - JOIN_YEAR))

          REPOS=$(echo $RESPONSE | jq -r '.public_repos')

          CONTRIBUTIONS=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -X POST \
            -d "{\"query\": \"{ user(login: \\\"$USERNAME\\\") { contributionsCollection { contributionCalendar { totalContributions } } } }\"}" \
            https://api.github.com/graphql \
            | jq -r '.data.user.contributionsCollection.contributionCalendar.totalContributions')

          # Format contributions (e.g., 4341 -> 4.3k, 4000 -> 4k)
          if [ "$CONTRIBUTIONS" -ge 1000 ]; then
            FORMATTED=$(awk "BEGIN {
              val = $CONTRIBUTIONS/1000;
              if (val == int(val)) printf \"%dk\", val;
              else printf \"%.1fk\", val;
            }")
          else
            FORMATTED=$CONTRIBUTIONS
          fi

          sed -i "s|<!--YEARS-->.*<!--/YEARS-->|<!--YEARS-->$YEARS<!--/YEARS-->|g" README.md
          sed -i "s|<!--REPOS-->.*<!--/REPOS-->|<!--REPOS-->$REPOS<!--/REPOS-->|g" README.md
          sed -i "s|<!--COMMITS-->.*<!--/COMMITS-->|<!--COMMITS-->$FORMATTED<!--/COMMITS-->|g" README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md
          git diff --cached --quiet || git commit -m "chore: update README stats"
          git push
